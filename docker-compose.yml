      - ASR_RESCUE_PADDING_MS=${ASR_RESCUE_PADDING_MS:-180}
      - ASR_RESCUE_BATCH_SIZE_S=${ASR_RESCUE_BATCH_SIZE_S:-30}
      - ASR_RESCUE_PRESET_SPEAKER_NUM=${ASR_RESCUE_PRESET_SPEAKER_NUM:-1}
      - ASR_RESCUE_MIN_SIMILARITY=${ASR_RESCUE_MIN_SIMILARITY:-0.62}
      - ASR_RESCUE_NOISE_MIN_SIMILARITY=${ASR_RESCUE_NOISE_MIN_SIMILARITY:-0.72}
      - ASR_RESCUE_AUDIO_FILTER=${ASR_RESCUE_AUDIO_FILTER:-}
      - ASR_RESCUE_PROVIDER=${ASR_RESCUE_PROVIDER:-sensevoice}
      - ASR_RESCUE_MODEL=${ASR_RESCUE_MODEL:-}
      - ASR_RESCUE_MODEL_ALIAS=${ASR_RESCUE_MODEL_ALIAS:-iic/SenseVoiceSmall}
      - ASR_QWEN_RESCUE_MODEL=${ASR_QWEN_RESCUE_MODEL:-}
      - ASR_QWEN_RESCUE_MODEL_ALIAS=${ASR_QWEN_RESCUE_MODEL_ALIAS:-Qwen/Qwen3-ASR-0.6B}
      - ASR_QWEN_RESCUE_RUNTIME_PATH=${ASR_QWEN_RESCUE_RUNTIME_PATH:-/data/qwen_asr_runtime}
      - ASR_QWEN_RESCUE_LANGUAGE=${ASR_QWEN_RESCUE_LANGUAGE:-Chinese}
      - ASR_QWEN_RESCUE_DTYPE=${ASR_QWEN_RESCUE_DTYPE:-bfloat16}
      - ASR_QWEN_RESCUE_DEVICE_MAP=${ASR_QWEN_RESCUE_DEVICE_MAP:-}
      - ASR_QWEN_RESCUE_MAX_NEW_TOKENS=${ASR_QWEN_RESCUE_MAX_NEW_TOKENS:-768}
      - ASR_QWEN_RESCUE_BATCH_SIZE=${ASR_QWEN_RESCUE_BATCH_SIZE:-1}
      - ASR_QWEN_RESCUE_MIN_SEGMENT_SECONDS=${ASR_QWEN_RESCUE_MIN_SEGMENT_SECONDS:-8}
      - ASR_QWEN_RESCUE_REASON_FILTER=${ASR_QWEN_RESCUE_REASON_FILTER:-suspect_terms,noise_terms,low_text_density,long_segment}
      - ASR_QWEN_RESCUE_CONTEXT=${ASR_QWEN_RESCUE_CONTEXT:-}
      - ASR_RESCUE_LANGUAGE=${ASR_RESCUE_LANGUAGE:-zh}
      - ASR_RESCUE_USE_ITN=${ASR_RESCUE_USE_ITN:-true}
