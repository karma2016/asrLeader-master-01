services:
  asr-leader-cpu:
    image: ${IMAGE:-funasr-leader-asr:cpu}
    ports:
      - "${ASR_PORT:-8002}:8000"
    environment:
      - ASR_DEVICE=cpu
      - MODELS_DIR=/app/models
      - DATA_DIR=/data
      - BATCH_SIZE_S=${BATCH_SIZE_S:-120}
      - VAD_MAX_SINGLE_SEGMENT_TIME_MS=${VAD_MAX_SINGLE_SEGMENT_TIME_MS:-30000}
      - ASR_HOTWORDS=${ASR_HOTWORDS:-}
      - ASR_QUALITY_MAX_SEGMENT_SECONDS=${ASR_QUALITY_MAX_SEGMENT_SECONDS:-120}
      - ASR_QUALITY_DOMINANT_SPEAKER_RATIO=${ASR_QUALITY_DOMINANT_SPEAKER_RATIO:-0.70}
      - ASR_QUALITY_MIN_EXPECTED_SPEAKERS=${ASR_QUALITY_MIN_EXPECTED_SPEAKERS:-2}
      - ASR_QUALITY_MIN_SEGMENTS_PER_HOUR=${ASR_QUALITY_MIN_SEGMENTS_PER_HOUR:-60}
      - ASR_AUTO_RETRY_BAD_DIARIZATION=${ASR_AUTO_RETRY_BAD_DIARIZATION:-true}
      - ASR_FALLBACK_SPEAKER_NUM=${ASR_FALLBACK_SPEAKER_NUM:-6}
      - ASR_RETRY_MIN_AUDIO_SECONDS=${ASR_RETRY_MIN_AUDIO_SECONDS:-300}
      - ASR_RETRY_MAX_SEGMENT_SECONDS=${ASR_RETRY_MAX_SEGMENT_SECONDS:-180}
      - ASR_RETRY_DOMINANT_SPEAKER_RATIO=${ASR_RETRY_DOMINANT_SPEAKER_RATIO:-0.80}
      - ASR_RESCUE_ENABLED=${ASR_RESCUE_ENABLED:-true}
      - ASR_RESCUE_MAX_SEGMENTS=${ASR_RESCUE_MAX_SEGMENTS:-24}
      - ASR_RESCUE_MAX_TOTAL_AUDIO_SECONDS=${ASR_RESCUE_MAX_TOTAL_AUDIO_SECONDS:-180}
      - ASR_RESCUE_MIN_SEGMENT_SECONDS=${ASR_RESCUE_MIN_SEGMENT_SECONDS:-0.6}
      - ASR_RESCUE_MAX_SEGMENT_SECONDS=${ASR_RESCUE_MAX_SEGMENT_SECONDS:-14}
      - ASR_RESCUE_LONG_SEGMENT_SECONDS=${ASR_RESCUE_LONG_SEGMENT_SECONDS:-18}
      - ASR_RESCUE_MIN_TEXT_CHARS_PER_SECOND=${ASR_RESCUE_MIN_TEXT_CHARS_PER_SECOND:-1.2}
      - ASR_RESCUE_PADDING_MS=${ASR_RESCUE_PADDING_MS:-180}
      - ASR_RESCUE_BATCH_SIZE_S=${ASR_RESCUE_BATCH_SIZE_S:-30}
      - ASR_RESCUE_PRESET_SPEAKER_NUM=${ASR_RESCUE_PRESET_SPEAKER_NUM:-1}
      - ASR_RESCUE_MIN_SIMILARITY=${ASR_RESCUE_MIN_SIMILARITY:-0.62}
      - ASR_RESCUE_AUDIO_FILTER=${ASR_RESCUE_AUDIO_FILTER:-}
      - POSTPROCESS_ENABLED=${POSTPROCESS_ENABLED:-true}
      - POSTPROCESS_PRELOAD=${POSTPROCESS_PRELOAD:-false}
      - POSTPROCESS_MODEL=${POSTPROCESS_MODEL:-Qwen/Qwen2.5-1.5B-Instruct}
      - POSTPROCESS_MODEL_DIR=${POSTPROCESS_MODEL_DIR:-}
      - POSTPROCESS_DEVICE=${POSTPROCESS_DEVICE:-cpu}
      - POSTPROCESS_MAX_CHARS=${POSTPROCESS_MAX_CHARS:-1200}
      - POSTPROCESS_MAX_NEW_TOKENS=${POSTPROCESS_MAX_NEW_TOKENS:-512}
      - POSTPROCESS_PROVIDER=${POSTPROCESS_PROVIDER:-local}
      - POSTPROCESS_MIN_SIMILARITY=${POSTPROCESS_MIN_SIMILARITY:-0.45}
      - POSTPROCESS_MAX_LENGTH_RATIO=${POSTPROCESS_MAX_LENGTH_RATIO:-1.80}
      - POSTPROCESS_MAX_LENGTH_EXTRA=${POSTPROCESS_MAX_LENGTH_EXTRA:-40}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-v4-flash}
      - DEEPSEEK_TIMEOUT_SECONDS=${DEEPSEEK_TIMEOUT_SECONDS:-120}
      - DEEPSEEK_MAX_TOKENS=${DEEPSEEK_MAX_TOKENS:-2048}
      - DEEPSEEK_TEMPERATURE=${DEEPSEEK_TEMPERATURE:-0}
      - DEEPSEEK_THINKING=${DEEPSEEK_THINKING:-disabled}
      - DEEPSEEK_CONTEXT_CHARS=${DEEPSEEK_CONTEXT_CHARS:-400}
      - LEADER_THRESHOLD=${LEADER_THRESHOLD:-0.45}
      - LEADER_SPEAKER_THRESHOLD=${LEADER_SPEAKER_THRESHOLD:-0.35}
      - LEADER_SEGMENT_THRESHOLD=${LEADER_SEGMENT_THRESHOLD:-0.50}
      - LEADER_SCORE_MARGIN=${LEADER_SCORE_MARGIN:-0.03}
      - LEADER_MIN_SEGMENT_SECONDS=${LEADER_MIN_SEGMENT_SECONDS:-1.0}
      - SPEAKER_AUTO_MERGE_THRESHOLD=${SPEAKER_AUTO_MERGE_THRESHOLD:-0.50}
      - SPEAKER_AUTO_MERGE_MARGIN=${SPEAKER_AUTO_MERGE_MARGIN:-0.10}
      - SPEAKER_AUTO_MERGE_MAX_SECONDS=${SPEAKER_AUTO_MERGE_MAX_SECONDS:-30.0}
      - SPEAKER_AUTO_MERGE_MAX_RATIO=${SPEAKER_AUTO_MERGE_MAX_RATIO:-0.08}
      - SPEAKER_JITTER_MAX_SECONDS=${SPEAKER_JITTER_MAX_SECONDS:-3.0}
      - SPEAKER_JITTER_MAX_GAP_SECONDS=${SPEAKER_JITTER_MAX_GAP_SECONDS:-0.8}
      - SPEAKER_JITTER_MIN_SIMILARITY=${SPEAKER_JITTER_MIN_SIMILARITY:-0.45}
      - SPEAKER_JITTER_MARGIN=${SPEAKER_JITTER_MARGIN:-0.08}
      - SEGMENT_MERGE_MAX_GAP_SECONDS=${SEGMENT_MERGE_MAX_GAP_SECONDS:-2.0}
      - LEADER_RELATIVE_MIN_SCORE=${LEADER_RELATIVE_MIN_SCORE:-0.12}
      - LEADER_RELATIVE_MARGIN=${LEADER_RELATIVE_MARGIN:-0.10}
      - LEADER_RELATIVE_SUPPORT_SEGMENTS=${LEADER_RELATIVE_SUPPORT_SEGMENTS:-3}
      - LEADER_SHORT_SUPPORT_SEGMENTS=${LEADER_SHORT_SUPPORT_SEGMENTS:-2}
      - LEADER_STRONG_SUPPORT_SEGMENTS=${LEADER_STRONG_SUPPORT_SEGMENTS:-6}
      - LEADER_STRONG_SUPPORT_MIN_SCORE=${LEADER_STRONG_SUPPORT_MIN_SCORE:-0.20}
      - LEADER_STRONG_SUPPORT_MARGIN=${LEADER_STRONG_SUPPORT_MARGIN:-0.04}
      - LEADER_MERGE_MATCHED_SPEAKERS=${LEADER_MERGE_MATCHED_SPEAKERS:-true}
      - LEADER_ENROLLMENT_MIN_SPEECH_SECONDS=${LEADER_ENROLLMENT_MIN_SPEECH_SECONDS:-5.0}
      - LEADER_ENROLLMENT_MIN_SIMILARITY=${LEADER_ENROLLMENT_MIN_SIMILARITY:-0.60}
      - LEADER_ENROLLMENT_SPEECH_DBFS=${LEADER_ENROLLMENT_SPEECH_DBFS:--50}
    volumes:
      - ./data:/data
    restart: unless-stopped
